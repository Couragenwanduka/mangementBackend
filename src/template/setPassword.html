<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Set Your Password - CourageGroup</title>
  </head>
  <body style="font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0;">
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center" style="padding: 40px 0;">
          <table width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 8px;">
            <tr>
              <td align="center" bgcolor="#4F46E5"  style="padding: 20px 0; color: white;">
                <h1>Set Your Password</h1>
              </td>
            </tr>
            <tr>
              <td style="padding: 30px;">
                <p style="font-size: 16px; color: #333333;">
                  Hi <strong>{{firstName}}</strong>,
                </p>
                <p style="font-size: 16px; color: #333333;">
                 Please set your password:
                </p>
                <div style="text-align: center; margin: 30px 0;">
                  <a href="{{passwordResetLink}}" style="background-color: #0052cc; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px;">
                    Set Your Password
                  </a>
                </div>
                <p style="font-size: 14px; color: #888888;">
                  If you have done it already, please ignore this email.
                </p>
                <p style="font-size: 16px; color: #333333;">Regards,<br /><strong>CourageGroup Team</strong></p>
              </td>
            </tr>
            <tr>
              <td align="center" bgcolor="#f0f0f0" style="padding: 20px; font-size: 12px; color: #666666;">
                &copy; 2025 CourageGroup. All rights reserved.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
